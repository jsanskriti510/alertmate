<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us | AlertMate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      /* Using the Cream color for the main background */
      background: #FAF3DD; 
      color: #5E6472; /* Dark Slate for text */
    }

    header {
      /* Using the Mint/Seafoam for the header */
      background: #27a088;
      color: #d2d9e8;
      padding: 40px 20px;
      text-align: center;
      border-bottom: 3px solid #AED9E0;
    }

    header h1 {
      margin: 0;
      font-size: 2.5rem;
      letter-spacing: 1px;
    }

    .container {
      max-width: 600px;
      margin: -30px auto 40px; /* Slight overlap with header */
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(94, 100, 114, 0.1);
    }

    h2 {
      text-align: center;
      color: #5E6472;
    }

    p {
      text-align: center;
      color: #7a8191;
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: 2px solid #AED9E0; /* Soft Blue border */
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #FFA69E; /* Coral highlight on focus */
    }

    textarea {
      resize: none;
      height: 120px;
    }

    button {
      margin-top: 30px;
      width: 100%;
      padding: 15px;
      /* Using Coral for the Action Button */
      background: #FFA69E;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
    }

    button:hover {
      background: #ff8e83;
      transform: translateY(-2px);
    }

    .contact-info {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      text-align: center;
      font-size: 14px;
    }

    .success-message {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background: #B8F2E6;
      border-radius: 8px;
      color: #2d5a50;
      text-align: center;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .container {
        margin: 10px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>AlertMate</h1>
  <p style="color: #d4d5d8; opacity: 0.8;">Keeping your loved ones safe</p>
</header>

<div class="container">
  <h2>Get in Touch</h2>
  <p>Have questions about your safety alerts? We're here to help 24/7.</p>

  <form id="contactForm">
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="John Doe" required>

    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="john@example.com" required>

    <label for="message">Your Message</label>
    <textarea id="message" placeholder="How can we help you today?" required></textarea>

    <button type="submit">Send Message</button>
  </form>

  <div class="success-message" id="successMsg">
    ✅ Message received! We'll reach out shortly.
  </div>

  <div class="contact-info">
    <p><strong>Email:</strong> support@alertmate.com</p>
    <p><strong>Emergency:</strong> Help is always a click away.</p>
  </div>
</div>

<script>
  const form = document.getElementById('contactForm');
  const successMsg = document.getElementById('successMsg');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    successMsg.style.display = 'block';
    form.style.display = 'none'; // Hide form on success for better UX
  });
</script>

</body>
</html>
