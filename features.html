<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AlertMate Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      text-align: center;
    }

    header {
      background: #2a7de1;
      color: white;
      padding: 20px;
    }

    .container {
      margin-top: 40px;
    }

    button {
      padding: 15px 25px;
      margin: 15px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .alert-btn {
      background: #ff4d4d;
      color: white;
    }

    .sos-btn {
      background: #ff9900;
      color: white;
    }

    .med-btn {
      background: #2ecc71;
      color: white;
    }

    .status {
      margin-top: 30px;
      font-size: 18px;
      font-weight: bold;
    }

    .log {
      margin-top: 20px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      height: 200px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

<header>
  <h1>AlertMate Demo Simulation</h1>
  <p>Test how the system works</p>
</header>

<div class="container">

  <button class="alert-btn" onclick="singlePress()">Single Press (Fall Alert)</button>
  <br>

  <button class="sos-btn" onclick="doublePress()">Double Press (SOS)</button>
  <br>

  <button class="med-btn" onclick="medicineReminder()">Medicine Reminder</button>

  <div class="status" id="status">System Ready</div>

  <div class="log" id="log"></div>

</div>

<script>
  const status = document.getElementById("status");
  const log = document.getElementById("log");

  function addLog(message) {
    const time = new Date().toLocaleTimeString();
    log.innerHTML += `[${time}] ${message}<br>`;
    log.scrollTop = log.scrollHeight;
  }

  function buzzer() {
    const beep = new Audio("https://www.soundjay.com/buttons/beep-07.wav");
    beep.play();
  }

  function singlePress() {
    buzzer();
    status.innerText = "Fall Detected! Alert sent to family.";
    addLog("Fall alert triggered. Notification sent.");
  }

  function doublePress() {
    buzzer();
    status.innerText = "SOS Sent! Immediate help required.";
    addLog("SOS alert sent to emergency contacts.");
  }

  function medicineReminder() {
    buzzer();
    status.innerText = "Time to take your medicine!";
    addLog("Medicine reminder triggered.");
  }

  // Optional auto reminder simulation (every 30 sec)
  setInterval(() => {
    medicineReminder();
  }, 30000);

</script>

</body>
</html>
