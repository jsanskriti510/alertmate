<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AlertMate Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --coral: #FFA69E;
      /* Fall Alert */
      --cream: #FAF3DD;
      /* Background */
      --mint: #B8F2E6;
      /* Medicine Reminder */
      --sky: #27a088;
      /* Header/Secondary */
      --slate: #5E6472;
      /* Text/Dark Elements */
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--cream);
      color: var(--slate);
      margin: 0;
      text-align: center;
    }

    header {
      background: var(--sky);
      color: #ffffff;
      padding: 30px;
      border-bottom: 3px solid var(--coral);
    }

    .container {
      margin-top: 40px;
      padding: 0 20px;
    }

    button {
      width: 100%;
      max-width: 300px;
      padding: 18px;
      margin: 10px 0;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      color: var(--slate);
    }

    button:active {
      transform: scale(0.98);
    }

    /* Mapping colors from your palette */
    .alert-btn {
      background: var(--coral);
    }

    .sos-btn {
      background: var(--slate);
      color: white;
    }

    .med-btn {
      background: var(--mint);
    }

    .status {
      margin-top: 30px;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      min-height: 1.5em;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: var(--slate);
      color: var(--cream);
      margin-top: 40px;
    }

    .log {
      margin: 20px auto;
      max-width: 500px;
      text-align: left;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      height: 150px;
      overflow-y: auto;
      border-left: 5px solid var(--sky);
      font-family: monospace;
    }
  </style>
</head>

<body>

  <header>
    <h1>AlertMate</h1>
    <p>Safety & Wellness Monitoring</p>
    <a href="howitworks.html">How it works?</a>
  </header>



  <div class="container">
    <button class="alert-btn" onclick="singlePress()">⚠️ Fall Alert</button>
    <br>
    <button class="med-btn" onclick="medicineReminder()">💊 Medicine Reminder</button>
    <br>
    <button class="sos-btn" onclick="doublePress()">🆘 Emergency SOS</button>

    <div class="status" id="status">System Active</div>
    <div class="log" id="log"></div>
  </div>
  <br>
  <br>
  <br>
  <br>
  <br>
  <br>
  <footer>
    <p>© 2026 AlertMate | Providing Peace of Mind | All Rights Reserved</p>
    <a href="aboutus.html" style="color:#ffffff;">About Us</a>
  </footer>
  <script>
    const status = document.getElementById("status");
    const log = document.getElementById("log");

    function addLog(message) {
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      log.innerHTML = `<div style="margin-bottom:5px;"><strong>[${time}]</strong> ${message}</div>` + log.innerHTML;
    }

    function buzzer() {
      // Note: Browsers often block auto-audio until first user interaction
      const beep = new Audio("https://www.soundjay.com/buttons/beep-07.wav");
      beep.play().catch(e => console.log("Audio waiting for interaction"));
    }

    function singlePress() {
      buzzer();
      status.innerText = "Fall Detected! Notifying Family...";
      status.style.color = "#d6685e"; // Darker coral for text
      addLog("Fall alert triggered.");
    }

    function doublePress() {
      buzzer();
      status.innerText = "SOS SENT! Emergency services called.";
      status.style.color = "black";
      addLog("CRITICAL: SOS alert sent.");
    }

    function medicineReminder() {
      buzzer();
      status.innerText = "Time for your medication.";
      status.style.color = "#6bbcae"; // Darker mint for text
      addLog("Medication reminder issued.");
    }
  </script>

</body>

</html>
