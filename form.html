<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlertMate | Pro Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --salmon: #ffa69e;
            --cream: #faf3dd;
            --mint: #aed9e0;
            --teal: #27a088;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(39, 160, 136, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            background-color: var(--white);
            overflow: hidden;
        }

        /* --- LEFT SIDE: UNCHANGED BRAND ANCHOR (35%) --- */
        .brand-panel {
            flex: 0 0 35%;
            position: relative;
            background: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow: hidden;
            border-right: 1px solid rgba(0,0,0,0.03);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--mint), var(--teal));
            filter: blur(80px);
            border-radius: 50%;
            z-index: 1;
            animation: move 20s infinite alternate;
            opacity: 0.6;
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
            background: var(--salmon);
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(20%, 20%) rotate(20deg); }
        }

        .brand-content {
            position: relative;
            z-index: 10;
            text-align: left;
        }

        .brand-logo {
            font-size: 3.5rem;
            font-weight: 800;
            color: #1a1a1a;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 20px;
        }

        .brand-logo span { color: var(--teal); }
        .dot { color: var(--salmon); }

        .brand-tagline {
            font-size: 1.1rem;
            color: #4a4a4a;
            font-weight: 500;
            border-left: 3px solid var(--salmon);
            padding-left: 15px;
        }

        /* --- ENHANCED RIGHT SIDE: THE PROFESSIONAL PORTAL (65%) --- */
        .portal-panel {
            flex: 0 0 65%;
            background-color: #fdfdfd;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .login-card {
            background: var(--white);
            padding: 50px;
            border-radius: 32px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 40px 80px rgba(246, 157, 148, 0.5);
            border: 1px solid rgba(0,0,0,0.02);
            position: relative;
            z-index: 5;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, var(--teal), transparent, var(--salmon));
            border-radius: 34px;
            z-index: -1;
            opacity: 0.15;
        }

        .login-card h2 {
            font-size: 2.4rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: #1a1a1a;
            letter-spacing: -1px;
        }

        .login-card .subtitle {
            color: #8892b0;
            margin-bottom: 40px;
            font-size: 1rem;
            font-weight: 400;
        }

        /* Pro Floating Label Input */
        .input-container {
            position: relative;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 22px;
            background: #f9fafb;
            border: 2px solid #edf2f7;
            border-radius: 18px;
            font-size: 1.1rem;
            color: #1a1a1a;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input:focus {
            background: var(--white);
            border-color: var(--teal);
            box-shadow: 0 10px 25px rgba(39, 160, 136, 0.1);
            transform: translateY(-2px);
        }

        .input-label {
            position: absolute;
            left: 20px;
            top: -10px;
            background: var(--white);
            padding: 0 10px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--teal);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-verify {
            width: 100%;
            padding: 20px;
            background: #1a1a1a;
            color: var(--white);
            border: none;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }

        .btn-verify:hover {
            background: var(--teal);
            box-shadow: 0 20px 40px rgba(39, 160, 136, 0.25);
            transform: translateY(-3px);
        }

        #status-msg {
            margin-top: 25px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            min-height: 20px;
        }

        /* Hardware Icons Decoration */
        .hw-footer {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            opacity: 0.3;
        }

        @media (max-width: 1000px) {
            body { flex-direction: column; overflow-y: auto; }
            .brand-panel { height: 30vh; flex: none; width: 100%; }
            .portal-panel { flex: none; width: 100%; padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <section class="brand-panel">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
        <div class="brand-content">
            <h1 class="brand-logo">Alert<span>Mate</span><span class="dot">.</span></h1>
            <p class="brand-tagline">Real-time monitoring <br> Watching over what matters most</p>
        </div>
    </section>

    <section class="portal-panel">
        <div class="login-card">
            <h2>Sign In</h2>
            <p class="subtitle">Connect your device.</p>
            
            <div class="input-container">
                <span class="input-label">Enter Device ID</span>
                <input type="password" id="passKey" placeholder="Enter Device ID" autocomplete="off">
            </div>

            <button class="btn-verify" onclick="handleAuth()">
                Authorize & Sync
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>

            <div id="status-msg"></div>

            <div class="hw-footer">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 2v20M2 12h20" stroke-width="2"/></svg>
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="4" stroke-width="2"/></svg>
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4h16v16H4z" stroke-width="2"/></svg>
            </div>
        </div>
    </section>

    <script>
        function handleAuth() {
            const input = document.getElementById('passKey');
            const status = document.getElementById('status-msg');
            const btn = document.querySelector('.btn-verify');

            if (input.value === "12345") {
                status.style.color = "var(--teal)";
                status.innerHTML = "✓ Handshake Successful. Synching hardware...";
                btn.style.background = "var(--teal)";
                btn.innerHTML = "Opening Dashboard...";
                btn.disabled = true;
                
                setTimeout(() => window.location.href = "index2.html", 1200);
            } else {
                status.style.color = "var(--salmon)";
                status.innerHTML = "✕ Authentication Error. Invalid Signature.";
                input.style.borderColor = "var(--salmon)";
                
                const card = document.querySelector('.login-card');
                card.animate([
                    { transform: 'translateX(0px)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0px)' }
                ], { duration: 300 });
                
                setTimeout(() => {
                    input.style.borderColor = "#edf2f7";
                }, 2000);
            }
        }
    </script>
</body>
</html>
