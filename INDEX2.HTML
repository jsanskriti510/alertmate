<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Mate | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary-color: #379bc6;
            --secondary-color: #5182c2;
            --bg-color: #eba937;
            --text-color: #000000;
            --error-color: #eb0505;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(139, 83, 83, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #0652bc;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #0466dd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(119, 127, 144, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background-color: var(--secondary-color);
        }

        #message {
            margin-top: 1rem;
            font-size: 0.85rem;
            min-height: 1.2rem;
        }

        .error { color: var(--error-color); }
        .success { color: #10b981; }

        .footer-links {
            margin-top: 1.5rem;
            font-size: 0.8rem;
        }

        .footer-links a {
            color: var(--primary-color);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">Alert Mate</div>
        <p class="subtitle">Securely sign in to your dashboard</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">DeviceId</label>
                <input type="text" id="username" placeholder="Enter your Device ID" required>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
            <div id="message"></div>
        </form>


    <script>
        /* --- JAVASCRIPT LOGIC --- */
        const loginForm = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page refresh

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Simple front-end validation check
            if (user === "admin" && pass === "password123") {
                messageDiv.textContent = "Login successful! Redirecting...";
                messageDiv.className = "success";
                
                // Simulate a delay for redirection
                setTimeout(() => {
                    alert("Welcome to Alert Mate!");
                    // window.location.href = "dashboard.html"; // Uncomment this to redirect
                }, 1000);
                
            } else {
                messageDiv.textContent = "Invalid username or password.";
                messageDiv.className = "error";
            }
        });
    </script>

</body>
</html>
