<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlertMate Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        header {
            background: #0a2540;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .value {
            font-size: 40px;
            font-weight: bold;
            color: #0077ff;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 15px;
            background: #0077ff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn:hover {
            background: #005fcc;
        }
    </style>
</head>

<body>

<header>
    <h1>AlertMate Dashboard</h1>
    <p>Live Fall Detection System</p>
</header>

<div class="dashboard">

    <!-- FALL COUNT -->
    <div class="card">
        <h2>No. of Falls</h2>
        <div class="value" id="falls">0</div>
    </div>

    <!-- RESET BUTTON -->
    <div class="card">
        <h2>Reset Counter</h2>
        <button class="btn" onclick="resetFalls()">Reset</button>
    </div>

</div>

<script>
    // 🔴 Load fall count from PHP
    function loadFalls() {
        fetch('get_falls.php')
            .then(response => response.text())
            .then(data => {
                document.getElementById("falls").innerText = data;
            })
            .catch(err => console.log("Error:", err));
    }

    // 🔴 Reset count
    function resetFalls() {
        fetch('reset.php')
            .then(() => loadFalls());
    }

    // 🔴 Auto refresh every 2 sec
    setInterval(loadFalls, 2000);

    // 🔴 Load once at start
    loadFalls();
</script>

</body>
</html>
